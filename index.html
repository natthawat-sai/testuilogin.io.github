<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Health App</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container">
        <div class="progress-container">
            <div class="step-indicator active" id="indicator-1">1</div>
            <div class="step-line"></div>
            <div class="step-indicator" id="indicator-2">2</div>
            <div class="step-line"></div>
            <div class="step-indicator" id="indicator-3">3</div>
        </div>

        <div id="step-1" class="form-step">
            <h2>สร้างบัญชีใหม่</h2>
            <p class="subtitle">เริ่มต้นสุขภาพที่ดีไปกับเรา</p>
            
            <div class="input-group">
                <label>อีเมล</label>
                <input type="email" id="email" placeholder="example@email.com">
            </div>
            <div class="input-group">
                <label>รหัสผ่าน</label>
                <input type="password" id="password" placeholder="อย่างน้อย 8 ตัวอักษร">
            </div>
            <div class="input-group">
                <label>ยืนยันรหัสผ่าน</label>
                <input type="password" id="confirm-password" placeholder="กรอกรหัสผ่านอีกครั้ง">
                <small id="error-msg" class="error-text hidden">รหัสผ่านไม่ตรงกัน</small>
            </div>

            <button class="btn-primary" id="btn-next-1">ถัดไป</button>
            <button class="btn-secondary">มีบัญชีอยู่แล้ว? เข้าสู่ระบบ</button>
        </div>

        <div id="step-2" class="form-step hidden">
            <h2>ยืนยันตัวตน</h2>
            <p class="subtitle">เราได้ส่งรหัส 6 หลักไปที่อีเมลของคุณแล้ว</p>
            
            <div class="otp-container">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
            </div>

            <button class="btn-primary" id="btn-next-2">ยืนยัน (Verify)</button>
            <p class="resend-text">ส่งรหัสอีกครั้งใน <span id="countdown">60</span> วินาที</p>
            <button class="btn-text" id="btn-back-1">ย้อนกลับ</button>
        </div>

        <div id="step-3" class="form-step hidden">
            <h2>ข้อมูลสุขภาพของคุณ</h2>
            <p class="subtitle">เพื่อการคำนวณที่แม่นยำและเหมาะสมกับคุณ</p>
            
            <div class="input-group">
                <label>ชื่อ-นามสกุล หรือ ชื่อเล่น</label>
                <input type="text" placeholder="ชื่อของคุณ">
            </div>

            <div class="input-group">
                <label>เพศ</label>
                <select>
                    <option value="" disabled selected>เลือกเพศ</option>
                    <option>ชาย</option>
                    <option>หญิง</option>
                    <option>ไม่ระบุ</option>
                </select>
            </div>

            <div class="row-2">
                <div class="input-group">
                    <label>น้ำหนัก (กก.)</label>
                    <input type="number" placeholder="เช่น 65">
                </div>
                <div class="input-group">
                    <label>ส่วนสูง (ซม.)</label>
                    <input type="number" placeholder="เช่น 170">
                </div>
            </div>

            <div class="input-group">
                <label>ระดับการออกกำลังกาย</label>
                <select>
                    <option>ไม่ออกกำลังกายเลย</option>
                    <option>เบาๆ (1-2 วัน/สัปดาห์)</option>
                    <option>ปานกลาง (3-5 วัน/สัปดาห์)</option>
                    <option>หนัก (6-7 วัน/สัปดาห์)</option>
                </select>
            </div>

            <div class="input-group">
                <label>เป้าหมายหลัก</label>
                <select>
                    <option>ลดน้ำหนัก / ลดไขมัน</option>
                    <option>สร้างกล้ามเนื้อ</option>
                    <option>รักษาสุขภาพ / ควบคุมน้ำหนัก</option>
                </select>
            </div>

            <button class="btn-primary" id="btn-finish">เริ่มต้นใช้งาน (Let's Go!)</button>
            <button class="btn-text" id="btn-back-2">ย้อนกลับ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
